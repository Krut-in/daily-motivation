name: Daily Motivation Email

on:
  schedule:
    # GitHub Actions cron is delayed by 80-200+ minutes on free runners.
    # We fire 13 times every 15 min from 9:30 to 12:30 UTC. The Python script
    # exits silently if (a) it is before 7:30 AM ET, or (b) today's email is
    # already in the archive. So only the first run that meets both conditions
    # actually sends. DST is handled inside the Python script via zoneinfo,
    # so this list never needs editing.
    - cron: '30 9 * * *'
    - cron: '45 9 * * *'
    - cron: '0 10 * * *'
    - cron: '15 10 * * *'
    - cron: '30 10 * * *'
    - cron: '45 10 * * *'
    - cron: '0 11 * * *'
    - cron: '15 11 * * *'
    - cron: '30 11 * * *'
    - cron: '45 11 * * *'
    - cron: '0 12 * * *'
    - cron: '15 12 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: write  # to commit archive markdown back to the repo

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send daily email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_motivation.py

      - name: Commit archive back to repo
        run: |
          git config user.name "Daily Motivation Bot"
          git config user.email "actions@github.com"
          git add archive/
          if ! git diff --cached --quiet; then
            git commit -m "Archive: daily email for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new archive file to commit."
          fi
