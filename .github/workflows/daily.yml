name: Daily Motivation Email

on:
  schedule:
    # GitHub may delay scheduled runs, so these 21 attempts fan out across the
    # morning. The script's 7:30 AM guard and archive check decide whether an
    # attempt should actually send.
    - cron: '30,45 3 * * *'
      timezone: America/New_York
    - cron: '*/15 4-7 * * *'
      timezone: America/New_York
    - cron: '0,15,30 8 * * *'
      timezone: America/New_York
  workflow_dispatch:
    inputs:
      mode:
        description: Preview a date, or send today's live email
        required: true
        default: preview
        type: choice
        options:
          - preview
          - live
      force_date:
        description: Preview date in YYYY-MM-DD format (required for preview; ignored for live)
        required: false
        type: string
      confirmation:
        description: Type SEND TODAY to confirm a live send
        required: false
        type: string

permissions:
  contents: read

jobs:
  preview:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'preview' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout current default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate preview date
        env:
          FORCE_DATE: ${{ inputs.force_date }}
        run: |
          if [[ ! "$FORCE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Preview mode requires force_date in YYYY-MM-DD format."
            exit 1
          fi
          python - "$FORCE_DATE" <<'PY'
          import sys
          from datetime import date

          try:
              date.fromisoformat(sys.argv[1])
          except ValueError as exc:
              raise SystemExit(f"Invalid preview date: {exc}")
          PY

      - name: Render preview
        env:
          FORCE_DATE: ${{ inputs.force_date }}
        run: python daily_motivation.py --dry-run --force-date "$FORCE_DATE"

  deliver:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'live') }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'schedule' }}
    permissions:
      contents: write
    concurrency:
      group: daily-motivation-delivery
      cancel-in-progress: false
      queue: single
    steps:
      - name: Checkout current default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Confirm manual live send
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: scripts/confirm_live_send.sh

      - name: Send today's email
        id: send
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_motivation.py

      - name: Commit archive back to main
        if: ${{ steps.send.outcome == 'success' }}
        run: |
          git config user.name "Daily Motivation Bot"
          git config user.email "actions@github.com"
          git add -- archive/

          if git diff --cached --quiet; then
            echo "No new archive file to commit."
            exit 0
          fi

          git commit -m "Archive: daily email for $(TZ='America/New_York' date +%Y-%m-%d)"

          for attempt in 1 2 3; do
            echo "Archive push attempt $attempt of 3"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Could not rebase the archive commit onto current main."
              exit 1
            fi

            if git push origin HEAD:main; then
              exit 0
            fi
          done

          echo "::error::Could not push the archive commit after 3 attempts."
          exit 1
