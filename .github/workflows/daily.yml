name: Daily Motivation Email

on:
  schedule:
    # GitHub Actions free-runner cron is delayed 80-200+ minutes (observed
    # 82, 148, 195 in the recent week). We fan out 21 triggers every 15 min
    # from 7:30 to 12:30 UTC, which covers delays from ~0 up to ~240 min
    # while still landing in the 7:30-8:30 AM ET window in nearly all cases.
    # Two guards in daily_motivation.py do the actual filtering:
    #   1. Window guard: exit silently if current ET time < 7:30 AM.
    #   2. Dedup guard: exit silently if today's archive file already exists.
    # The concurrency block below serializes runs so two near-simultaneous
    # triggers cannot both pass the dedup guard and double-send.
    # DST is handled inside the Python script via zoneinfo, so this list
    # never needs seasonal edits.
    - cron: '30 7 * * *'
    - cron: '45 7 * * *'
    - cron: '0 8 * * *'
    - cron: '15 8 * * *'
    - cron: '30 8 * * *'
    - cron: '45 8 * * *'
    - cron: '0 9 * * *'
    - cron: '15 9 * * *'
    - cron: '30 9 * * *'
    - cron: '45 9 * * *'
    - cron: '0 10 * * *'
    - cron: '15 10 * * *'
    - cron: '30 10 * * *'
    - cron: '45 10 * * *'
    - cron: '0 11 * * *'
    - cron: '15 11 * * *'
    - cron: '30 11 * * *'
    - cron: '45 11 * * *'
    - cron: '0 12 * * *'
    - cron: '15 12 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:  # manual trigger for testing

concurrency:
  group: daily-motivation
  cancel-in-progress: false  # let the in-flight run finish; queue the next one

permissions:
  contents: write  # to commit archive markdown back to the repo

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send daily email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_motivation.py

      - name: Commit archive back to repo
        run: |
          git config user.name "Daily Motivation Bot"
          git config user.email "actions@github.com"
          git add archive/
          if ! git diff --cached --quiet; then
            git commit -m "Archive: daily email for $(TZ='America/New_York' date +%Y-%m-%d)"
            git push
          else
            echo "No new archive file to commit."
          fi
